<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(105, 105, 173);
            color: whitesmoke;
            font-family: monospace;
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt('Seu nome')
        var nasc = window.prompt('Data de nascimento')
        var atual = window.prompt('Ano atual')
        var idade = atual - nasc
        idade>18? document.write(`${nome} tem ${idade} e está apto a tirar carteira`):document.write(`${nome} tem ${idade} e não está apto a tirar carteira`)
    </script>
</body>
</html>
