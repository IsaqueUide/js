<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area{
            font: normal 20pt arial;
            background-color: green;
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
        #area:hover{
            background-color: rgb(58, 213, 65);
        }
    </style>
</head>
<body>
    <div id="area">
        interaja...
    </div>
    <script>
        var a = window.document.getElementById('area')
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair)
        function clicar(){
            /* tudo que estiver aqui dentro só será executado quanto o evento clicar() for ativado. Nesse caso ao clicar na div essa função irá mudar o texto da div para Clicou
            */
           a.style.background = 'red'
           a.innerText = 'Clicou'
        }
        function entrar(){
            a.innerText="Entrou!"
        }
        function sair(){
            a.innerText="Saiu!"
            a.style.background='green'
        }
    </script>
</body>
</html>
