<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto com condições</title>
    <style>
        input{
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <h1>Pode ou não dirigir</h1>
    Ano de nascimento: <input type="number" name="nascimento" id="nascimento"> <input type="button" value="adicionar" onclick="adicionar()">
    <div id="resnas"></div>
    
    Ano atual: <input type="number" name="agora" id="agora"> <input type="button" value="verificar">
    <div id="resatual"></div>
    <Script>
        function adicionar(){
            var txtnas = document.querySelector('input#nascimento')
            var nas = Number(txtnas.value)
            var resnas = document.getElementById('resnas')
            resnas.innerHTML = `Você nasceu em ${nas}`
        }
    </Script>
</body>
</html>
