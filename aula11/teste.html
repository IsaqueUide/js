<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto com condições</title>
    <style>
        input{
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <h1>Pode ou não tirar carteira de motorista</h1>
    
    Seu ano de nascimento: <input type="number" name="txtnas" id="txtnas">
    <input type="button" value="verificar" onclick="nascimento()"> <br>
    <div id="resnas"></div>

    <script>
        var txtn = window.document.getElementById('txtnas')
        var nas = Number(txtn.value)
        var resnas = window.document.getElementById('div#resnas')
        function nascimento(){
            resnas.innerText = `Você nascem em ${nas}`
        }
    </script>
</body>
</html>
